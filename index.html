<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe!</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    
<div class="container">
    <div class="title"><h1>Tic-Tac-Toe</h1></div>
    <div class="rules">Player One goes first. First one to get three in a row wins!</div>
    <div class="cell">TL</div>
    <div class="cell">TM</div>
    <div class="cell">TR</div>
    <div class="cell">ML</div>
    <div class="cell">MM</div>
    <div class="cell">MR</div>
    <div class="cell">BL</div>
    <div class="cell">BM</div>
    <div class="cell">BR</div>
    <div class="whosTurn"></div>
    <div class="gameResult"></div>
    <button class="reset">Reset</button>
</div>



</body>
</html>
